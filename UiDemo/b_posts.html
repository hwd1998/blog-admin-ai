<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Lora:ital,wght@0,400;0,700;1,400&amp;family=JetBrains+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#dadad8",
                    "on-surface": "#1a1c1b",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed": "#001c37",
                    "primary-fixed": "#ffdea6",
                    "tertiary": "#085ea2",
                    "surface-bright": "#f9f9f7",
                    "on-primary-fixed-variant": "#5d4200",
                    "on-background": "#1a1c1b",
                    "on-primary-fixed": "#271900",
                    "tertiary-fixed-dim": "#a1c9ff",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-tint": "#7b5800",
                    "primary-fixed-dim": "#f7bd48",
                    "secondary-fixed": "#e5e2e1",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e8e8e6",
                    "on-error-container": "#93000a",
                    "on-primary-container": "#fffbff",
                    "on-secondary-container": "#636262",
                    "background": "#f9f9f7",
                    "surface-container-highest": "#e2e3e1",
                    "secondary": "#5f5e5e",
                    "primary-container": "#986d00",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#004880",
                    "surface-container": "#eeeeec",
                    "on-tertiary-container": "#fdfcff",
                    "outline": "#817563",
                    "on-secondary": "#ffffff",
                    "inverse-primary": "#f7bd48",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#3477bc",
                    "tertiary-fixed": "#d2e4ff",
                    "on-secondary-fixed": "#1c1b1b",
                    "surface-variant": "#e2e3e1",
                    "secondary-container": "#e2dfde",
                    "surface-container-low": "#f4f4f2",
                    "inverse-on-surface": "#f1f1ef",
                    "on-surface-variant": "#4f4535",
                    "outline-variant": "#d3c4af",
                    "secondary-fixed-dim": "#c8c6c5",
                    "primary": "#785600",
                    "on-secondary-fixed-variant": "#474746",
                    "inverse-surface": "#2f3130",
                    "surface": "#f9f9f7"
            },
            "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Lora", "serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"],
                    "mono": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Lora', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- SideNavBar (B-end Anchor) -->
<aside class="fixed left-0 top-0 h-full w-[220px] bg-[#1A1A1A] shadow-2xl z-50 flex flex-col py-8">
<div class="px-8 mb-12">
<h1 class="font-serif text-amber-500 text-lg uppercase tracking-widest">THE CURATOR</h1>
<p class="text-stone-500 text-[10px] uppercase tracking-[0.2em] mt-1">Admin Panel</p>
</div>
<nav class="flex-1 space-y-2">
<!-- Navigation Mapping: Active state logic applied to "Posts" as we are in the editor -->
<a class="flex items-center gap-4 transition-all duration-300 hover:bg-stone-800 hover:text-amber-400 text-stone-400 pl-4 py-3" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-sans text-sm tracking-wide">Overview</span>
</a>
<a class="flex items-center gap-4 text-white font-bold border-l-4 border-amber-500 pl-4 bg-stone-800/50 py-3 translate-x-1 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="article">article</span>
<span class="font-sans text-sm tracking-wide">Posts</span>
</a>
<a class="flex items-center gap-4 transition-all duration-300 hover:bg-stone-800 hover:text-amber-400 text-stone-400 pl-4 py-3" href="#">
<span class="material-symbols-outlined" data-icon="folder">folder</span>
<span class="font-sans text-sm tracking-wide">Categories</span>
</a>
<a class="flex items-center gap-4 transition-all duration-300 hover:bg-stone-800 hover:text-amber-400 text-stone-400 pl-4 py-3" href="#">
<span class="material-symbols-outlined" data-icon="comment">comment</span>
<span class="font-sans text-sm tracking-wide">Comments</span>
</a>
<a class="flex items-center gap-4 transition-all duration-300 hover:bg-stone-800 hover:text-amber-400 text-stone-400 pl-4 py-3" href="#">
<span class="material-symbols-outlined" data-icon="image">image</span>
<span class="font-sans text-sm tracking-wide">Media</span>
</a>
</nav>
<div class="mt-auto px-4 space-y-4">
<a class="flex items-center gap-4 transition-all duration-300 hover:bg-stone-800 hover:text-amber-400 text-stone-400 pl-4 py-3" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-sans text-sm tracking-wide">Settings</span>
</a>
<div class="pt-4 border-t border-stone-800">
<button class="w-full py-2 px-4 text-amber-500 border border-amber-500/30 text-xs tracking-widest hover:bg-amber-500 hover:text-stone-900 transition-colors">
                    Back to Front-end
                </button>
</div>
</div>
</aside>
<!-- Main Content Area -->
<main class="ml-[220px] min-h-screen flex flex-col">
<!-- Editor Toolbar -->
<header class="h-[56px] bg-white/80 backdrop-blur-md border-b border-stone-200/50 sticky top-0 z-40 flex items-center justify-between px-12">
<div class="flex items-center gap-6">
<span class="text-xs font-mono text-stone-400 uppercase tracking-widest">Draft Saved at 14:02</span>
<div class="h-4 w-px bg-stone-200"></div>
<div class="flex items-center gap-4 text-stone-600">
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="format_bold">format_bold</span></button>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="format_italic">format_italic</span></button>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="format_quote">format_quote</span></button>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="link">link</span></button>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="image">image</span></button>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="code">code</span></button>
</div>
</div>
<div class="flex items-center gap-4">
<button class="text-xs uppercase tracking-widest text-stone-500 hover:text-on-surface transition-colors">Preview</button>
<button class="bg-primary text-on-primary px-6 py-2 text-xs uppercase tracking-[0.2em] font-medium hover:bg-primary-container transition-all">Publish</button>
</div>
</header>
<!-- Two Column Layout -->
<div class="flex flex-1 overflow-hidden">
<!-- Left: Writing Area (65%) -->
<section class="w-[65%] p-24 overflow-y-auto no-scrollbar bg-surface-container-lowest">
<div class="max-w-[720px] mx-auto">
<textarea class="w-full bg-transparent border-none focus:ring-0 p-0 text-5xl font-serif font-bold tracking-tight text-on-surface placeholder:text-stone-300 resize-none h-auto mb-12" placeholder="Enter article title..." rows="2"></textarea>
<div class="prose prose-stone max-w-none">
<textarea class="w-full bg-transparent border-none focus:ring-0 p-0 text-lg leading-relaxed font-body text-stone-700 placeholder:text-stone-300 resize-none min-h-[600px]" placeholder="Begin your narrative here..."></textarea>
</div>
</div>
</section>
<!-- Right: Settings Panel (35%) -->
<section class="w-[35%] bg-surface border-l border-stone-200/50 p-12 overflow-y-auto no-scrollbar">
<div class="space-y-12">
<!-- Status Section -->
<div>
<label class="block text-[10px] uppercase tracking-[0.2em] text-stone-400 font-bold mb-6">Status &amp; Visibility</label>
<div class="space-y-4">
<div class="flex items-center justify-between p-4 bg-surface-container-low">
<span class="text-sm font-body text-stone-600">Post Status</span>
<span class="text-xs font-mono px-2 py-1 bg-amber-100 text-amber-800">DRAFT</span>
</div>
<div class="flex items-center justify-between p-4 bg-surface-container-low">
<span class="text-sm font-body text-stone-600">Visibility</span>
<span class="text-sm font-medium text-on-surface">Public</span>
</div>
</div>
</div>
<!-- URL Slug -->
<div>
<label class="block text-[10px] uppercase tracking-[0.2em] text-stone-400 font-bold mb-4">Permanent Link</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none focus:ring-0 focus:bg-surface-container-high py-4 px-4 text-sm font-mono text-stone-600 transition-colors" type="text" value="the-silent-curator-of-digital-spaces"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
<!-- Featured Image -->
<div>
<label class="block text-[10px] uppercase tracking-[0.2em] text-stone-400 font-bold mb-4">Featured Image</label>
<div class="aspect-video bg-surface-container-low border-2 border-dashed border-outline-variant flex flex-col items-center justify-center cursor-pointer group hover:border-primary transition-colors overflow-hidden relative">
<img class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale hover:grayscale-0 transition-all duration-500" data-alt="minimalist interior design with a single designer chair and architectural lighting in a clean white space" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3Us9poztEW3Ji-Zd9mqKVe2DAefVtZgVAc3isjX9yg9GNYhHfLhCuK9pI06bNK4eQtU6C6jakU_ZRRYd00DlGaq3rqAbc3q1k7rVp4SHChlqguk-Vsn5VjtXDskNHRbJVjVt4gRaazdA-MgFJMYIlCUUKqpvkX_Hsqse-or22IR0zdIzJar8r4Rmv6BPOsMkXGLQ2VsiDD1u9-PfLWqSRuMJ0Hc8jybsfZSgpJJuEgy7ps2vPSfYALFy9uof_tSOZS3NIpqHgddQr"/>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-stone-400 group-hover:text-primary transition-colors mb-2" data-icon="add_a_photo">add_a_photo</span>
<span class="text-xs text-stone-500 uppercase tracking-widest">Replace Media</span>
</div>
</div>
</div>
<!-- Excerpt -->
<div>
<label class="block text-[10px] uppercase tracking-[0.2em] text-stone-400 font-bold mb-4">Article Excerpt</label>
<textarea class="w-full bg-surface-container-low border-none focus:ring-0 py-4 px-4 text-sm font-body text-stone-600 leading-relaxed resize-none min-h-[120px]" placeholder="A brief summary for the archival feed..."></textarea>
</div>
<!-- Tags -->
<div>
<label class="block text-[10px] uppercase tracking-[0.2em] text-stone-400 font-bold mb-4">Taxonomy</label>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1 bg-stone-200 text-stone-600 text-[10px] uppercase tracking-wider flex items-center gap-2">
                                Design <span class="material-symbols-outlined text-[14px] cursor-pointer" data-icon="close">close</span>
</span>
<span class="px-3 py-1 bg-stone-200 text-stone-600 text-[10px] uppercase tracking-wider flex items-center gap-2">
                                Minimalism <span class="material-symbols-outlined text-[14px] cursor-pointer" data-icon="close">close</span>
</span>
<button class="px-3 py-1 border border-stone-200 text-stone-400 text-[10px] uppercase tracking-wider hover:border-primary hover:text-primary transition-colors">
                                + Add Tag
                            </button>
</div>
</div>
<!-- Post Actions -->
<div class="pt-12 border-t border-stone-200/50 space-y-4">
<button class="w-full bg-primary text-on-primary py-4 text-xs font-bold uppercase tracking-[0.3em] hover:bg-primary-container transition-all duration-300 shadow-lg shadow-primary/10">
                            Publish Narrative
                        </button>
<button class="w-full bg-transparent border border-error/20 text-error/60 py-4 text-xs font-bold uppercase tracking-[0.3em] hover:bg-error/5 transition-all">
                            Discard Archive
                        </button>
</div>
</div>
</section>
</div>
</main>
<!-- Floating Help Anchor -->
<button class="fixed bottom-8 right-8 w-12 h-12 bg-inverse-surface text-inverse-on-surface flex items-center justify-center hover:scale-110 transition-transform z-50 shadow-2xl">
<span class="material-symbols-outlined text-sm" data-icon="help_outline">help_outline</span>
</button>
</body></html>
