<style>
        body {
            background-color: #f9f9f7;
            color: #1a1c1b;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-link {
            position: relative;
            text-decoration: none;
        }
        .editorial-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #B8860B;
            transition: width 0.3s ease-out;
        }
        .editorial-link:hover::after {
            width: 100%;
        }

<body class="selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex flex-col">
<!-- TopAppBar (shared component) -->
<header class="bg-[#f9f9f7] dark:bg-[#141414] w-full top-0 px-8 py-12">
<div class="flex justify-between items-center max-w-[720px] mx-auto w-full">
<h1 class="text-3xl font-serif tracking-tighter text-[#1a1c1b] dark:text-[#E8E8E6]">THE CURATOR</h1>
<nav class="flex gap-8">
<a class="text-[#1a1c1b] dark:text-[#E8E8E6] font-sans text-xs uppercase tracking-widest hover:opacity-70 transition-opacity duration-300" href="#">Archives</a>
<a class="text-[#1a1c1b] dark:text-[#E8E8E6] font-sans text-xs uppercase tracking-widest hover:opacity-70 transition-opacity duration-300" href="#">
<span class="material-symbols-outlined align-middle" data-icon="account_circle">account_circle</span>
</a>
</nav>
</div>
</header>
<!-- Main Content: Perfectly Symmetrical & Centered -->
<main class="flex-grow flex flex-col items-center justify-center px-8 py-24">
<div class="max-w-md w-full text-center space-y-16">
<!-- Header Section -->
<section class="space-y-6">
<span class="font-mono text-[10px] uppercase tracking-widest text-accent-gold">Identity Access</span>
<h2 class="text-5xl font-serif tracking-tighter leading-tight text-on-surface">
                    Return to the <br/> <span class="italic font-serif">Archive.</span>
</h2>
<p class="font-sans text-sm text-secondary leading-relaxed font-light mx-auto max-w-xs">
                    Enter your credentials to access your curated monographs and private collections.
                </p>
</section>
<!-- Login Card -->
<section class="bg-surface-container-lowest p-10 md:p-14 w-full shadow-sm">
<form class="space-y-10">
<!-- Email Input -->
<div class="group relative flex flex-col gap-2 items-center">
<label class="font-sans text-[10px] uppercase tracking-widest text-on-surface-variant font-medium" for="email">Email Address</label>
<input class="w-full bg-surface-container-low border-none border-b border-transparent focus:border-accent-gold focus:ring-0 px-0 py-3 text-center text-on-surface font-serif text-lg placeholder:text-outline-variant/50 placeholder:font-sans transition-all duration-300" id="email" placeholder="name@monograph.com" type="email"/>
</div>
<!-- Password Input -->
<div class="group relative flex flex-col gap-2 items-center">
<label class="font-sans text-[10px] uppercase tracking-widest text-on-surface-variant font-medium" for="password">Password</label>
<input class="w-full bg-surface-container-low border-none border-b border-transparent focus:border-accent-gold focus:ring-0 px-0 py-3 text-center text-on-surface font-serif text-lg placeholder:text-outline-variant/50 transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Actions -->
<div class="flex flex-col gap-8 pt-4 items-center">
<button class="w-full bg-accent-gold text-white font-sans text-xs uppercase tracking-[0.2em] font-bold py-5 px-12 text-center hover:opacity-90 transition-all duration-300 ease-out" type="submit">
                            Authenticate
                        </button>
<div class="flex flex-col gap-4 items-center">
<a class="editorial-link font-sans text-[9px] uppercase tracking-widest text-accent-gold font-bold" href="#">
                                Forgot Credentials
                            </a>
<a class="editorial-link font-sans text-[9px] uppercase tracking-widest text-on-surface-variant" href="#">
                                Request Access
                            </a>
</div>
</div>
</form>
</section>
</div>
</main>
<!-- Footer (shared component) -->
<footer class="bg-[#f9f9f7] dark:bg-[#141414] w-full bottom-0 py-24 border-t border-surface-container">
<div class="max-w-[720px] mx-auto px-8 flex flex-col items-center text-center gap-8">
<div class="font-serif italic text-2xl text-on-surface">THE CURATOR</div>
<div class="flex flex-wrap justify-center gap-8">
<a class="font-sans text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-[#785600] transition-colors duration-300" href="#">Archives</a>
<a class="font-sans text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-[#785600] transition-colors duration-300" href="#">Colophon</a>
<a class="font-sans text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-[#785600] transition-colors duration-300" href="#">Privacy</a>
</div>
<p class="font-sans text-[10px] uppercase tracking-widest text-on-surface-variant opacity-50">
                © 2024 THE CURATOR. A DIGITAL MONOGRAPH.
            </p>
</div>
</footer>
